        *{

        body{

    }
        nav{
            display: flex;
            justify-content: center;     /* vai      centralizar na horizontal */
            gap: 100px;
            margin: 0px;
            font-size: 25px;
            font-weight:bold;
            background-color: black;
            }

            nav a{
                color:white;
            }
             nav a:hover{
                color: yellow;
             }
            
            
    


        .videos{
            display: grid;  /* O display: grid  transforma um elemento em um contêiner de grade, permitindo organizar seus filhos em linhas e colunas. */
            grid-template-columns:repeat(2, 1fr); /* é usada para organizar elementos em linhas e colunas, nesse caso os videos. O repeat(2, 1fr) significa que queremos criar 2 colunas de largura igual (1fr cada). */
            gap: 20px;
            justify-content:center; /* centraliza os itens horizontalmente dentro do contêiner de grade */
            align-items: center; /* Alinha os itens verticalmente ao centro, tem que esta dentro do display grid */
            max-width:900px;
            margin:auto;
            
        }
        .videos iframe{
            width:100% ;
            height:  auto;

        }

     
     

    </style>
